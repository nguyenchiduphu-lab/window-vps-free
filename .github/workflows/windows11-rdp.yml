name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Time (1-6h)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"
  NGROK_TOKEN: "3AhYtwzZwyMGsFQwLkXpeWjQ0VK_7UW19kGqsP6jDMb6DR5wd"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Info
        shell: pwsh
        run: |
          Write-Host "🚀 SERVER HRGBVN PRO"
          Write-Host "${{ env.SUBTITLE }}"
          Write-Host "OS: Windows 11"
          Write-Host "Time: ${{ github.event.inputs.duration }}h"

      - name: Setup
        shell: pwsh
        run: |
          Get-Service WSearch -ErrorAction SilentlyContinue | Stop-Service -Force -ErrorAction SilentlyContinue
          Set-Service WSearch -StartupType Disabled -ErrorAction SilentlyContinue

      - name: Download Ngrok
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "C:\ngrok.zip"
          Expand-Archive -Path "C:\ngrok.zip" -DestinationPath "C:\ngrok" -Force
          & "C:\ngrok\ngrok.exe" --version

      - name: Create User
        shell: pwsh
        run: |
          $user = "nguyenchidu"
          $pass = "HRGBVN2024@"
          try { Remove-LocalUser -Name $user -ErrorAction SilentlyContinue } catch {}
          $securePass = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $securePass -PasswordNeverExpires -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member $user
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Write-Host "User: $user"
          Write-Host "Pass: $pass"

      - name: Start Ngrok and Get URL
        shell: pwsh
        run: |
          # Chay ngrok voi token truc tiep
          $ngrokPath = "C:\ngrok\ngrok.exe"
          $token = "${{ env.NGROK_TOKEN }}"
          
          # Tao process ngrok
          $proc = Start-Process -FilePath $ngrokPath -ArgumentList "tcp","3389","--authtoken",$token -PassThru -WindowStyle Hidden
          
          Write-Host "Ngrok dang khoi dong... (PID: $($proc.Id))"
          Start-Sleep -Seconds 10
          
          # Thu lay URL nhieu lan
          $url = $null
          for ($i = 1; $i -le 30; $i++) {
            try {
              $res = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -TimeoutSec 5 -ErrorAction Stop
              $url = $res.tunnels[0].public_url
              Write-Host "✅ Thanh cong sau $i lan thu!"
              break
            } catch {
              Write-Host "Thu lan $i..."
              Start-Sleep -Seconds 2
            }
          }
          
          if (-not $url) {
            Write-Host "❌ Khong lay duoc URL"
            Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
            exit 1
          }
          
          # Hien thi thong tin
          $clean = $url -replace "tcp://",""
          $parts = $clean -split ":"
          
          Write-Host ""
          Write-Host "============================"
          Write-Host "🚀 SERVER HRGBVN PRO"
          Write-Host "${{ env.SUBTITLE }}"
          Write-Host "============================"
          Write-Host "✅ KET NOI RDP:"
          Write-Host "Host: $($parts[0])"
          Write-Host "Port: $($parts[1])"
          Write-Host "User: nguyenchidu"
          Write-Host "Pass: HRGBVN2024@"
          Write-Host "Time: ${{ github.event.inputs.duration }}h"
          Write-Host "============================"
          
          # Giu ngrok chay
          $h = [int]"${{ github.event.inputs.duration }}"
          $end = (Get-Date).AddHours($h)
          
          while ((Get-Date) -lt $end) {
            Start-Sleep -Seconds 60
            # Kiem tra ngrok con chay khong
            if ($proc.HasExited) {
              Write-Host "❌ Ngrok da tat, khoi dong lai..."
              $proc = Start-Process -FilePath $ngrokPath -ArgumentList "tcp","3389","--authtoken",$token -PassThru -WindowStyle Hidden
            }
            $remain = $end - (Get-Date)
            Write-Host "⏱️ Con: $($remain.ToString('hh\:mm\:ss'))"
          }
          
          # Tat ngrok
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Get-Process ngrok -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          try { Remove-LocalUser -Name "nguyenchidu" -ErrorAction SilentlyContinue } catch {}
          Remove-Item "C:\ngrok.zip" -ErrorAction SilentlyContinue
          Remove-Item "C:\ngrok" -Recurse -Force -ErrorAction SilentlyContinue
