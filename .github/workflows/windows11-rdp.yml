name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Time (1-6h)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Check Ngrok Token
        run: |
          if ("${{ secrets.NGROK_AUTH_TOKEN }}" -eq "") {
            Write-Host "LOI: Chua co NGROK_AUTH_TOKEN"
            Write-Host "-> Vao Settings > Secrets > New repository secret"
            Write-Host "-> Name: NGROK_AUTH_TOKEN"
            Write-Host "-> Value: Token ngrok cua ban"
            exit 1
          }

      - name: Start Server
        run: |
          echo "🚀 SERVER HRGBVN PRO"
          echo "${{ env.SUBTITLE }}"
          echo "OS: Windows 11"
          echo "Time: ${{ github.event.inputs.duration }}h"

      - name: Clean System
        run: |
          Stop-Service WSearch -Force -ErrorAction SilentlyContinue
          Set-Service WSearch -StartupType Disabled -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install Ngrok
        run: |
          try {
            Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
            Expand-Archive "ngrok.zip" "C:\ngrok" -Force
          } catch {
            Write-Host "LOI: Tai ngrok that bai"
            exit 1
          }

      - name: Setup Ngrok
        run: |
          $token = "${{ secrets.NGROK_AUTH_TOKEN }}"
          C:\ngrok\ngrok.exe config add-authtoken $token
          if ($LASTEXITCODE -ne 0) {
            Write-Host "LOI: Token ngrok sai"
            exit 1
          }

      - name: Setup RDP
        run: |
          net user HRGBVN HRGBVN2024 /add 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "LOI: Tao user that bai"
            exit 1
          }
          net localgroup administrators HRGBVN /add
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' "fDenyTSConnections" 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Start Tunnel
        run: |
          Start-Process "C:\ngrok\ngrok.exe" "tcp 3389" -WindowStyle Hidden
          Start-Sleep 10
          
          try {
            $res = Invoke-RestMethod "http://localhost:4040/api/tunnels"
            $url = $res.tunnels[0].public_url -replace "tcp://",""
            $host = ($url -split ":")[0]
            $port = ($url -split ":")[1]
          } catch {
            Write-Host "LOI: Ngrok khong khoi dong duoc"
            Write-Host "-> Kiem tra token"
            exit 1
          }
          
          echo "=== THONG TIN ==="
          echo "Host: $host"
          echo "Port: $port"
          echo "User: HRGBVN"
          echo "Pass: HRGBVN2024"
          echo "Time: ${{ github.event.inputs.duration }}h"
          echo "================="

      - name: Running
        run: |
          $h = [int]${{ github.event.inputs.duration }}
          $end = (Get-Date).AddHours($h)
          while ((Get-Date) -lt $end) {
            Start-Sleep 300
            Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue 2>$null
            $con = $end - (Get-Date)
            Write-Host "Con: $($con.ToString('hh\:mm\:ss'))"
          }

      - name: Stop
        if: always()
        run: |
          Stop-Process -Name "ngrok" -Force -ErrorAction SilentlyContinue
          net user HRGBVN /delete 2>$null
