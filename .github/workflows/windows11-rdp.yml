name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Time (1-6h)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Check Token
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.NGROK_AUTH_TOKEN }}")) {
            Write-Error "LOI: Chua co NGROK_AUTH_TOKEN trong Secrets"
            exit 1
          }

      - name: Start
        shell: pwsh
        run: |
          Write-Host "🚀 SERVER HRGBVN PRO"
          Write-Host "${{ env.SUBTITLE }}"
          Write-Host "OS: Windows 11"
          Write-Host "Time: ${{ github.event.inputs.duration }}h"

      - name: Clean
        shell: pwsh
        run: |
          Get-Service WSearch,SysMain,DiagTrack -ErrorAction SilentlyContinue | Stop-Service -Force -ErrorAction SilentlyContinue
          Set-Service WSearch -StartupType Disabled -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install Ngrok
        shell: pwsh
        run: |
          Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          Expand-Archive "ngrok.zip" "C:\ngrok" -Force

      - name: Setup Ngrok
        shell: pwsh
        run: |
          & "C:\ngrok\ngrok.exe" config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"

      - name: Create User
        shell: pwsh
        run: |
          $user = "nguyenchidu"
          $pass = -join ((48..57) + (65..90) + (97..122) | Get-Random -Count 12 | ForEach-Object {[char]$_}) + "@1"
          
          try { Remove-LocalUser -Name $user -ErrorAction SilentlyContinue } catch {}
          
          $securePass = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $securePass -PasswordNeverExpires -AccountNeverExpires -ErrorAction Stop
          Add-LocalGroupMember -Group "Administrators" -Member $user
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          "$user`n$pass" | Out-File "C:\rdpinfo.txt"
          Write-Host "User: $user"
          Write-Host "Pass: $pass"

      - name: Start Tunnel
        shell: pwsh
        run: |
          # Start ngrok
          Start-Process -FilePath "C:\ngrok\ngrok.exe" -ArgumentList "tcp 3389" -WindowStyle Hidden
          
          # Doi ngrok khoi dong (thu nhieu lan)
          $maxTry = 10
          $tunnels = $null
          
          for ($i = 1; $i -le $maxTry; $i++) {
            Start-Sleep -Seconds 5
            try {
              $tunnels = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
              Write-Host "Ngrok da san sang sau $i lan thu"
              break
            } catch {
              Write-Host "Thu lan $i..."
            }
          }
          
          if ($null -eq $tunnels) {
            Write-Error "LOI: Khong ket noi duoc ngrok sau $maxTry lan thu"
            exit 1
          }
          
          $url = $tunnels.tunnels[0].public_url -replace "tcp://",""
          $parts = $url -split ":"
          
          $info = Get-Content "C:\rdpinfo.txt"
          $user = $info[0]
          $pass = $info[1]
          
          Write-Host ""
          Write-Host "============================"
          Write-Host "🚀 SERVER HRGBVN PRO"
          Write-Host "${{ env.SUBTITLE }}"
          Write-Host "============================"
          Write-Host "Host: $($parts[0])"
          Write-Host "Port: $($parts[1])"
          Write-Host "User: $user"
          Write-Host "Pass: $pass"
          Write-Host "Time: ${{ github.event.inputs.duration }}h"
          Write-Host "============================"

      - name: Run
        shell: pwsh
        run: |
          $h = [int]"${{ github.event.inputs.duration }}"
          $end = (Get-Date).AddHours($h)
          while ((Get-Date) -lt $end) {
            Start-Sleep -Seconds 300
            Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue 2>$null
            $remain = $end - (Get-Date)
            Write-Host "Con: $($remain.ToString('hh\:mm\:ss'))"
          }

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Stop-Process -Name "ngrok" -Force -ErrorAction SilentlyContinue
          try { Remove-LocalUser -Name "nguyenchidu" -ErrorAction SilentlyContinue } catch {}
          Remove-Item "C:\rdpinfo.txt" -ErrorAction SilentlyContinue
