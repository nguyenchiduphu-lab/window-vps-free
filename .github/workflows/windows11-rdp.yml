name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Thời gian chạy (giờ) - Tối đa 6h'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🚀 Khởi động Server HRGBVN PRO
        run: |
          echo "=================================="
          echo "  server HRGBVN PRO 🚀"
          echo "  ${{ env.SUBTITLE }}"
          echo "=================================="
          echo "⏰ Thời gian chạy: ${{ github.event.inputs.duration }} giờ"
          echo "💻 Hệ điều hành: Windows 11"
          echo "=================================="

      - name: 📥 Cài đặt Chocolatey & Phần mềm cần thiết
        run: |
          Set-ExecutionPolicy Bypass -Scope Process -Force
          [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072
          Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
          choco feature enable -n allowGlobalConfirmation

      - name: 🖥️ Cài đặt Chrome (nhẹ, hỗ trợ YouTube)
        run: |
          choco install googlechrome --ignore-checksums -y

      - name: 🔧 Cài đặt Ngrok
        run: |
          choco install ngrok -y

      - name: ⚡ Tối ưu hệ thống - Tắt dịch vụ không cần thiết
        run: |
          # Tắt Windows Update để tránh lag
          Stop-Service wuauserv -Force -ErrorAction SilentlyContinue
          Set-Service wuauserv -StartupType Disabled -ErrorAction SilentlyContinue
          
          # Tắt dịch vụ tìm kiếm để tiết kiệm RAM
          Stop-Service WSearch -Force -ErrorAction SilentlyContinue
          Set-Service WSearch -StartupType Disabled -ErrorAction SilentlyContinue
          
          # Tắt dịch vụ Superfetch/SysMain
          Stop-Service SysMain -Force -ErrorAction SilentlyContinue
          Set-Service SysMain -StartupType Disabled -ErrorAction SilentlyContinue
          
          # Tắt dịch vụ Diagnostic
          Stop-Service DiagTrack -Force -ErrorAction SilentlyContinue
          Set-Service DiagTrack -StartupType Disabled -ErrorAction SilentlyContinue
          
          Write-Host "✅ Đã tối ưu dịch vụ hệ thống"

      - name: 🧹 Dọn dẹp hệ thống - Giải phóng RAM & Disk
        run: |
          # Xóa file tạm
          Remove-Item -Path "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue
          
          # Xóa Prefetch
          Remove-Item -Path "C:\Windows\Prefetch\*" -Force -ErrorAction SilentlyContinue
          
          # Chạy Disk Cleanup tự động
          Start-Process -FilePath "cleanmgr.exe" -ArgumentList "/sagerun:1" -WindowStyle Hidden -Wait
          
          Write-Host "🧹 Đã dọn dẹp hệ thống"

      - name: 🌐 Cấu hình Ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken $env:NGROK_AUTH_TOKEN

      - name: 🖥️ Bật Remote Desktop
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

      - name: 🔐 Tạo tài khoản người dùng
        run: |
          $password = ConvertTo-SecureString "Hrgbvn@123" -AsPlainText -Force
          New-LocalUser -Name "hrgbvn" -Password $password -FullName "HRGBVN User" -Description "HRGBVN PRO Server"
          Add-LocalGroupMember -Group "Administrators" -Member "hrgbvn"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "hrgbvn"

      - name: 🚀 Khởi động Ngrok Tunnel (RDP)
        run: |
          Start-Process -FilePath "ngrok.exe" -ArgumentList "tcp 3389" -WindowStyle Hidden
          Start-Sleep -Seconds 5

      - name: 📋 Lấy thông tin kết nối
        run: |
          Write-Host "=================================="
          Write-Host "  🎯 THÔNG TIN KẾT NỐI RDP"
          Write-Host "=================================="
          Write-Host "👤 Username: hrgbvn"
          Write-Host "🔑 Password: Hrgbvn@123"
          Write-Host ""
          Write-Host "🔗 Ngrok URL:"
          Invoke-RestMethod -Uri http://localhost:4040/api/tunnels | Select-Object -ExpandProperty tunnels | Select-Object public_url
          Write-Host "=================================="
          Write-Host "⚠️ Lưu ý: Không chạy file nặng, không có GPU!"
          Write-Host "✅ Hỗ trợ: YouTube, Chrome, file .exe nhẹ"
          Write-Host "=================================="

      - name: ⏱️ Giữ server chạy theo thời gian đã chọn
        run: |
          $hours = [int]"${{ github.event.inputs.duration }}"
          $seconds = $hours * 3600
          Write-Host "⏰ Server sẽ chạy trong $hours giờ..."
          Write-Host "🕐 Bắt đầu: $(Get-Date)"
          Write-Host "🕐 Kết thúc: $((Get-Date).AddHours($hours))"
          
          for ($i = $seconds; $i -gt 0; $i -= 60) {
              $remainingHours = [math]::Floor($i / 3600)
              $remainingMinutes = [math]::Floor(($i % 3600) / 60)
              Write-Host "⏳ Còn lại: $remainingHours giờ $remainingMinutes phút - $(Get-Date)"
              
              # Dọn dẹp mỗi 10 phút để tránh lag
              if ($i % 600 -eq 0) {
                  Write-Host "🧹 Đang dọn dẹp hệ thống tự động..."
                  Remove-Item -Path "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
                  [GC]::Collect()
                  [GC]::WaitForPendingFinalizers()
              }
              
              Start-Sleep -Seconds 60
          }

      - name: 🛑 Dọn dẹp trước khi kết thúc
        if: always()
        run: |
          Write-Host "🧹 Dọn dẹp cuối cùng..."
          Stop-Process -Name "ngrok" -Force -ErrorAction SilentlyContinue
          Remove-Item -Path "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
          [GC]::Collect()
          Write-Host "✅ Đã dọn dẹp xong!"
