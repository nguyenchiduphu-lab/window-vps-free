name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Thời gian chạy (giờ) - Tối đa 6h'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🚀 Khởi động
        run: |
          echo "server HRGBVN PRO 🚀"
          echo "${{ env.SUBTITLE }}"
          echo "Thoi gian: ${{ github.event.inputs.duration }}h"

      - name: ⚡ Tắt dịch vụ nặng
        run: |
          cmd /c "sc stop wuauserv & sc config wuauserv start= disabled & sc stop WSearch & sc config WSearch start= disabled & sc stop SysMain & sc config SysMain start= disabled" >nul 2>&1
          Write-Host "✅ Tối ưu xong!"

      - name: 📥 Cài Ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip" -UseBasicParsing
          Expand-Archive "ngrok.zip" -DestinationPath "." -Force
          .\ngrok.exe config add-authtoken $env:NGROK_AUTH_TOKEN 2>$null

      - name: 🔐 Bật RDP + Tạo User nguyenchidu
        run: |
          # Bật RDP bằng PowerShell (ổn định hơn)
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          
          # Tạo password random 12 ký tự
          $passRandom = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 12 | ForEach-Object {[char]$_})
          "PASSWORD=$passRandom" | Out-File -FilePath $env:GITHUB_ENV -Append
          
          # Tạo user nguyenchidu
          $passSecure = ConvertTo-SecureString $passRandom -AsPlainText -Force
          New-LocalUser -Name "nguyenchidu" -Password $passSecure -FullName "Nguyen Chi Du" -Description "HRGBVN User" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "nguyenchidu" -ErrorAction SilentlyContinue
          
          Write-Host "✅ User nguyenchidu da tao!"

      - name: 🌐 Chạy Ngrok + Hiện Info
        run: |
          Start-Process .\ngrok.exe -ArgumentList "tcp 3389" -WindowStyle Hidden
          Start-Sleep 4
          
          Write-Host "`n=================================="
          Write-Host "  🎯 KẾT NỐI RDP"
          Write-Host "=================================="
          Write-Host "👤 User: nguyenchidu"
          Write-Host "🔑 Pass: ${{ env.PASSWORD }}"
          $url = (Invoke-RestMethod http://localhost:4040/api/tunnels -TimeoutSec 5).tunnels.public_url
          Write-Host "🔗 URL:  $url"
          Write-Host "=================================="
          Write-Host "⚠️ LUU PASSWORD LAI NGAY!"

      - name: ⏱️ Giữ server chạy
        run: |
          $h = [int]"${{ github.event.inputs.duration }}"
          Write-Host "⏰ Dang chay $h gio..."
          for ($i = $h*60; $i -gt 0; $i--) {
              if ($i % 30 -eq 0) { [GC]::Collect() | Out-Null }
              Start-Sleep 60
          }
