name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Thời gian chạy (giờ) - Tối đa 6h'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🚀 Khởi động Server HRGBVN PRO
        run: |
          echo "=================================="
          echo "  server HRGBVN PRO 🚀"
          echo "  ${{ env.SUBTITLE }}"
          echo "=================================="
          echo "⏰ Thời gian: ${{ github.event.inputs.duration }}h | 💻 Windows 11"

      - name: ⚡ Tối ưu & Dọn dẹp SIÊU NHANH (3 giây)
        run: |
          # Tắt dịch vụ nặng ngay lập tức
          Get-Service wuauserv,WSearch,SysMain,DiagTrack -ErrorAction SilentlyContinue | Stop-Service -Force -ErrorAction SilentlyContinue
          Get-Service wuauserv,WSearch,SysMain,DiagTrack -ErrorAction SilentlyContinue | Set-Service -StartupType Disabled -ErrorAction SilentlyContinue
          
          # Xóa temp không đợi (chạy ngầm)
          Start-Job { Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue } | Out-Null
          Start-Job { Remove-Item "C:\Windows\Temp\*" -Recurse -Force -ErrorAction SilentlyContinue } | Out-Null
          
          # Giải phóng RAM ngay
          [GC]::Collect(); [GC]::WaitForPendingFinalizers()
          
          Write-Host "✅ Tối ưu xong! (~3 giây)"

      - name: 📥 Cài Ngrok & Chrome (song song)
        run: |
          # Cài ngrok
          choco install ngrok -y --no-progress --limit-output 2>$null
          
          # Cài chrome không hiển thị
          choco install googlechrome -y --ignore-checksums --no-progress --limit-output 2>$null

      - name: 🔐 Cấu hình RDP & User
        run: |
          Set-ItemProperty 'HKLM:\System\CurrentControlSet\Control\Terminal Server' "fDenyTSConnections" 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          $pass = ConvertTo-SecureString "Hrgbvn@123" -AsPlainText -Force
          New-LocalUser "hrgbvn" -Password $pass -FullName "HRGBVN" -ErrorAction SilentlyContinue
          Add-LocalGroupMember "Administrators" "hrgbvn" -ErrorAction SilentlyContinue

      - name: 🌐 Khởi động Ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken $env:NGROK_AUTH_TOKEN 2>$null
          Start-Process ngrok -ArgumentList "tcp 3389" -WindowStyle Hidden
          Start-Sleep 3

      - name: 📋 Hiển thị thông tin kết nối
        run: |
          Write-Host "`n=================================="
          Write-Host "  🎯 KẾT NỐI RDP"
          Write-Host "=================================="
          Write-Host "👤 User: hrgbvn"
          Write-Host "🔑 Pass: Hrgbvn@123"
          $url = (Invoke-RestMethod http://localhost:4040/api/tunnels -TimeoutSec 5).tunnels.public_url
          Write-Host "🔗 URL:  $url"
          Write-Host "=================================="

      - name: ⏱️ Giữ server chạy + Dọn dẹp nhẹ mỗi 15 phút
        run: |
          $h = [int]"${{ github.event.inputs.duration }}"
          for ($i = $h*60; $i -gt 0; $i--) {
              if ($i % 15 -eq 0) { 
                  Start-Job { [GC]::Collect() } | Out-Null  # Dọn RAM nhẹ
              }
              Start-Sleep 60
          }
