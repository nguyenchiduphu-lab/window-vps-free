name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Thời gian chạy (giờ) - Tối đa 6h'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🚀 Khởi động
        run: |
          echo "server HRGBVN PRO 🚀"
          echo "${{ env.SUBTITLE }}"
          echo "Thoi gian: ${{ github.event.inputs.duration }}h"

      - name: ⚡ Tắt dịch vụ nặng (1 giây)
        run: |
          cmd /c "sc stop wuauserv & sc config wuauserv start= disabled & sc stop WSearch & sc config WSearch start= disabled & sc stop SysMain & sc config SysMain start= disabled" >nul 2>&1
          Write-Host "✅ Tối ưu xong!"

      - name: 📥 Cài Ngrok (5 giây)
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          # Tải ngrok trực tiếp, không qua choco
          Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip" -UseBasicParsing
          Expand-Archive "ngrok.zip" -DestinationPath "." -Force
          .\ngrok.exe config add-authtoken $env:NGROK_AUTH_TOKEN 2>$null

      - name: 🔐 Bật RDP + Tạo User (2 giây)
        run: |
          # Bật RDP
          reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f >nul 2>&1
          netsh advfirewall firewall set rule group="remote desktop" new enable=yes >nul 2>&1
          
          # Tạo user nhanh
          net user hrgbvn Hrgbvn@123 /add >nul 2>&1
          net localgroup administrators hrgbvn /add >nul 2>&1

      - name: 🌐 Chạy Ngrok + Hiện Info (3 giây)
        run: |
          Start-Process .\ngrok.exe -ArgumentList "tcp 3389" -WindowStyle Hidden
          Start-Sleep 3
          
          Write-Host "`n=================================="
          Write-Host "  🎯 KẾT NỐI RDP"
          Write-Host "=================================="
          Write-Host "👤 User: hrgbvn"
          Write-Host "🔑 Pass: Hrgbvn@123"
          $url = (Invoke-RestMethod http://localhost:4040/api/tunnels -TimeoutSec 3).tunnels.public_url
          Write-Host "🔗 URL:  $url"
          Write-Host "=================================="

      - name: ⏱️ Giữ server chạy
        run: |
          $h = [int]"${{ github.event.inputs.duration }}"
          Write-Host "⏰ Dang chay $h gio..."
          for ($i = $h*60; $i -gt 0; $i--) {
              if ($i % 30 -eq 0) { [GC]::Collect() | Out-Null }
              Start-Sleep 60
          }
