name: SERVER PREMIUM HRGBVN PRO 🚀 - Win11

on:
  workflow_dispatch:
    inputs:
      ngrok_download_url:
        description: 'Ngrok download link'
        required: true
        default: 'https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download ngrok
        run: |
          Invoke-WebRequest -Uri "${{ github.event.inputs.ngrok_download_url }}" -OutFile ngrok.zip
          Expand-Archive ngrok.zip -DestinationPath .

      - name: Auth ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: .\ngrok.exe authtoken $Env:NGROK_AUTH_TOKEN

      - name: Setup RDP + Max Fast Intro + Reduce Lag + Low Data Mode
        run: |
          # Enable RDP + Firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Tạo user với pass random
          $randomPassword = -join ((33..47) + (48..57) + (65..90) + (97..122) | Get-Random -Count 16 | ForEach-Object {[char]$_})
          New-LocalUser "nguyenchidu" -Password (ConvertTo-SecureString -AsPlainText $randomPassword -Force) -FullName "nguyenchidu PRO" -Description "SERVER PREMIUM HRGBVN PRO" -ErrorAction SilentlyContinue

          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "nguyenchidu" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "nguyenchidu" -ErrorAction SilentlyContinue

          # Lưu password vào file để hiển thị sau
          $randomPassword | Out-File -FilePath "C:\password.txt" -Encoding utf8

          # Tắt service nặng (CPU/RAM trống)
          @("SysMain","WSearch","wuauserv","WinDefend","DiagTrack") | ForEach-Object {
            Stop-Service -Name $_ -Force -ErrorAction SilentlyContinue
            Set-Service -Name $_ -StartupType Disabled -ErrorAction SilentlyContinue
          }
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue

          # Tối ưu RDP + giảm bandwidth/data (low quality)
          New-Item -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Force | Out-Null
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MaxCompressionLevel" -Value 2 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "MinEncryptionLevel" -Value 1 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "NegotiateSecurityLayer" -Value 0 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services\Client' -Name "DisableRdpdr" -Value 1 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services' -Name "fDisableCdm" -Value 1 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "ColorDepth" -Value 4 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fEnableThinClient" -Value 1 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fEnableDesktopComposition" -Value 0 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "fEnableWddmDriver" -Value 0 -ErrorAction SilentlyContinue

          # HKCU settings: Tạo key nếu chưa tồn tại + SilentlyContinue để tránh fail
          New-Item -Path 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects' -Force -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\VisualEffects' -Name "VisualFXSetting" -Value 2 -ErrorAction SilentlyContinue

          $explorerAdvanced = 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced'
          if (!(Test-Path $explorerAdvanced)) { New-Item -Path $explorerAdvanced -Force | Out-Null }
          Set-ItemProperty -Path $explorerAdvanced -Name "TaskbarAnimations" -Value 0 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path $explorerAdvanced -Name "ListviewAlphaSelect" -Value 0 -ErrorAction SilentlyContinue

          $dwm = 'HKCU:\Software\Microsoft\Windows\DWM'
          if (!(Test-Path $dwm)) { New-Item -Path $dwm -Force | Out-Null }
          Set-ItemProperty -Path $dwm -Name "EnableAeroPeek" -Value 0 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path $dwm -Name "Animations" -Value 0 -ErrorAction SilentlyContinue

          $windowMetrics = 'HKCU:\Control Panel\Desktop\WindowMetrics'
          if (!(Test-Path $windowMetrics)) { New-Item -Path $windowMetrics -Force | Out-Null }
          Set-ItemProperty -Path $windowMetrics -Name "MinAnimate" -Value "0" -ErrorAction SilentlyContinue

          Set-ItemProperty -Path 'HKCU:\Software\Microsoft\Windows\CurrentVersion\Themes\Personalize' -Name "EnableTransparency" -Value 0 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKCU:\Control Panel\Desktop' -Name "DragFullWindows" -Value "0" -ErrorAction SilentlyContinue

          # In intro PREMIUM
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      SERVER PREMIUM HRGBVN PRO 🚀 - WINDOWS 11     ║" -ForegroundColor Magenta
          Write-Host "║                                                    ║" -ForegroundColor Green
          Write-Host "║  Username → nguyenchidu                            ║" -ForegroundColor Yellow
          Write-Host "║  Password → [RANDOM - XEM BÊN DƯỚI]                ║" -ForegroundColor Yellow
          Write-Host "║                                                    ║" -ForegroundColor Green
          Write-Host "╚════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

      - name: Start Ngrok Tunnel - PREMIUM PRO Flash Mode (Low Data)
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║      SERVER PREMIUM HRGBVN PRO 🚀 - WINDOWS 11     ║" -ForegroundColor Magenta
          Write-Host "║  ⚠️ CẢNH BÁO PREMIUM: Tránh vượt 1GB ngrok free!   ║" -ForegroundColor Red
          Write-Host "║  - Chọn 'Modem (56 Kbps)' hoặc Low-speed trong RDP client" -ForegroundColor Yellow
          Write-Host "║  - Không copy file lớn, xem video dài, mở nhiều tab" -ForegroundColor Yellow
          Write-Host "║  - Ngrok free: max ~1GB/tháng → ~2-6h RDP low quality" -ForegroundColor Red
          Write-Host "║  - Ping thấp region Asia (ap) cho VN tốt           ║" -ForegroundColor Green
          Write-Host "╚════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

          Start-Process -WindowStyle Hidden -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389 --log=stdout --log-level=info --region=ap"

          Start-Sleep -Seconds 25

          try {
            $tunnels = Invoke-RestMethod http://localhost:4040/api/tunnels
            $tcpTunnel = ($tunnels.tunnels | Where-Object { $_.proto -eq "tcp" }).public_url
            if ($tcpTunnel) {
              $hostPort = $tcpTunnel -replace "tcp://", ""
              $password = Get-Content "C:\password.txt"
              
              Write-Host "🌟 NGROK PREMIUM ADDRESS (paste vào Remote Desktop Connection):" -ForegroundColor Green
              Write-Host "          $hostPort" -ForegroundColor Magenta
              Write-Host ""
              Write-Host "  Username → nguyenchidu" -ForegroundColor Yellow
              Write-Host "  Password → $password" -ForegroundColor Yellow
              Write-Host ""
              Write-Host "⚡ Kết nối ngay! Dùng low quality để session lâu ⚡" -ForegroundColor Yellow
            } else {
              Write-Host "❌ Không thấy tunnel! Check authtoken hoặc ngrok limit." -ForegroundColor Red
            }
          } catch {
            Write-Host "Lỗi lấy tunnel: $_" -ForegroundColor Red
          }

          Write-Host ""
          Write-Host "Session max ~6h (GitHub limit). Re-run để renew." -ForegroundColor DarkCyan
          Write-Host "Check usage: https://dashboard.ngrok.com/usage" -ForegroundColor DarkCyan

          Start-Sleep -Seconds 21420
