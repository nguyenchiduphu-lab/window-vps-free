name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Thời gian chạy (giờ) - Tối đa 6h'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: 🚀 Khởi động
        shell: cmd
        run: |
          echo server HRGBVN PRO 🚀
          echo MADE BY : Nguyễn Chí Dự
          echo Thoi gian: ${{ github.event.inputs.duration }}h

      - name: ⚡ Tắt dịch vụ nặng
        shell: cmd
        run: |
          sc stop wuauserv >nul 2>&1
          sc config wuauserv start= disabled >nul 2>&1
          sc stop WSearch >nul 2>&1
          sc config WSearch start= disabled >nul 2>&1
          sc stop SysMain >nul 2>&1
          sc config SysMain start= disabled >nul 2>&1
          echo Tối ưu xong!

      - name: 📥 Cài Ngrok
        shell: pwsh
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
          Expand-Archive "ngrok.zip" -DestinationPath "." -Force
          .\ngrok.exe config add-authtoken $env:NGROK_AUTH_TOKEN

      - name: 🔐 Bật RDP + Tạo User nguyenchidu
        shell: cmd
        run: |
          REM Bật RDP
          reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          netsh advfirewall firewall set rule group="remote desktop" new enable=yes
          
          REM Tạo password random 12 ký tự
          setlocal EnableDelayedExpansion
          set "chars=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789"
          set "password="
          for /L %%i in (1,1,12) do (
            set /a "rand=!random! %% 62"
            for %%j in (!rand!) do set "password=!password!!chars:~%%j,1!"
          )
          echo PASSWORD=!password!>> %GITHUB_ENV%
          
          REM Tạo user nguyenchidu
          net user nguyenchidu !password! /add
          net localgroup administrators nguyenchidu /add
          
          echo User nguyenchidu da tao voi password: !password!

      - name: 🌐 Chạy Ngrok + Hiện Info
        shell: pwsh
        run: |
          $env:PASSWORD = "${{ env.PASSWORD }}"
          Start-Process .\ngrok.exe -ArgumentList "tcp 3389" -WindowStyle Hidden
          Start-Sleep 5
          
          Write-Host ""
          Write-Host "=================================="
          Write-Host "  🎯 KẾT NỐI RDP"
          Write-Host "=================================="
          Write-Host "👤 User: nguyenchidu"
          Write-Host "🔑 Pass: $env:PASSWORD"
          $url = (Invoke-RestMethod http://localhost:4040/api/tunnels -TimeoutSec 5).tunnels.public_url
          Write-Host "🔗 URL:  $url"
          Write-Host "=================================="
          Write-Host "⚠️ LUU PASSWORD LAI NGAY!"

      - name: ⏱️ Giữ server chạy
        shell: pwsh
        run: |
          $h = [int]"${{ github.event.inputs.duration }}"
          Write-Host "⏰ Dang chay $h gio..."
          for ($i = $h*60; $i -gt 0; $i--) {
              if ($i % 30 -eq 0) { [GC]::Collect() | Out-Null }
              Start-Sleep 60
          }
