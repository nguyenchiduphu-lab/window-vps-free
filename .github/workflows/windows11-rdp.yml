name: SERVER PREMIUM HRGBVN PRO 🚀

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Set Timezone to Vietnam (Asia/Ho_Chi_Minh)
        uses: szenius/set-timezone@v2.0
        with:
          timezoneWindows: "SE Asia Standard Time"

      - name: Download ngrok
        run: |
          Write-Host "🔄 Đang tải ngrok..." -ForegroundColor Cyan
          $url = "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip"
          $headers = @{ "User-Agent" = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" }
          $success = $false
          for ($i = 1; $i -le 10; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile "ngrok.zip" -Headers $headers -UseBasicParsing -TimeoutSec 120
              if ((Get-Item "ngrok.zip").Length / 1MB -gt 8) { $success = $true; break }
            } catch { Write-Host "Lần $i lỗi, thử lại..." -ForegroundColor Red }
            Start-Sleep -Seconds 10
          }
          if (-not $success) { exit 1 }
          Expand-Archive "ngrok.zip" -DestinationPath . -Force
          Write-Host "✅ Ngrok sẵn sàng!" -ForegroundColor Green

      - name: Auth ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          .\ngrok.exe authtoken $Env:NGROK_AUTH_TOKEN
          Write-Host "✅ Auth ngrok thành công!" -ForegroundColor Green

      - name: Setup RDP + Tối Ưu Máy + Bỏ Password Policy
        run: |
          # Bật RDP + Firewall
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # === TẮT HOÀN TOÀN PASSWORD POLICY ===
          Write-Host "🔓 Đang tắt Password Complexity & Minimum Length..." -ForegroundColor Yellow

          # Backup và chỉnh policy
          secedit /export /cfg C:\secpol.cfg
          (Get-Content C:\secpol.cfg) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' | Set-Content C:\secpol.cfg
          (Get-Content C:\secpol.cfg) -replace 'MinimumPasswordLength = \d+', 'MinimumPasswordLength = 0' | Set-Content C:\secpol.cfg
          (Get-Content C:\secpol.cfg) -replace 'PasswordHistorySize = \d+', 'PasswordHistorySize = 0' | Set-Content C:\secpol.cfg
          secedit /configure /db secedit.sdb /cfg C:\secpol.cfg /areas SECURITYPOLICY
          Remove-Item C:\secpol.cfg -Force -ErrorAction SilentlyContinue

          net accounts /minpwlen:0 /maxpwage:unlimited /minpwage:0 /uniquepw:0

          # Áp dụng policy ngay
          gpupdate /force | Out-Null

          # Xóa user cũ nếu tồn tại (tránh lỗi half-created)
          Remove-LocalUser -Name "Nguyen Chi Du - VIP" -ErrorAction SilentlyContinue

          # Tạo mật khẩu siêu mạnh
          Add-Type -AssemblyName System.Web
          $pw = [System.Web.Security.Membership]::GeneratePassword(22, 8)
          $pw += "A1@bZ"   # Đảm bảo đủ ký tự đặc biệt

          Write-Host "=====================================" -ForegroundColor Cyan
          Write-Host "👤 USERNAME : Nguyen Chi Du - VIP" -ForegroundColor Green
          Write-Host "🔑 PASSWORD : $pw" -ForegroundColor Yellow
          Write-Host "=====================================" -ForegroundColor Cyan
          Write-Host "⚠️  COPY NGAY MẬT KHẨU NÀY TRƯỚC KHI THOÁT!" -ForegroundColor Red
          Write-Host "=====================================" -ForegroundColor Cyan

          # Tạo user mới
          New-LocalUser "Nguyen Chi Du - VIP" -Password (ConvertTo-SecureString $pw -AsPlainText -Force) -FullName "Nguyen Chi Du - VIP" -Description "VIP User" -ErrorAction Stop
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Nguyen Chi Du - VIP"
          Add-LocalGroupMember -Group "Administrators" -Member "Nguyen Chi Du - VIP"

          # Tắt service nặng (giữ Audio)
          $heavy = @("SysMain","WSearch","wuauserv","WinDefend","DiagTrack","DPS","DoSvc","Spooler","Themes","BITS","wscsvc","SecurityHealthService","Sense","OneSyncSvc","CDPSvc","DmEnrollmentSvc","PcaSvc","WerSvc","TabletInputService","XblAuthManager","XblGameSave","XboxNetApiSvc","BthAvctpSvc","RmSvc","WlanSvc","WbioSrvc","PrintWorkflowUserSvc","Fax","SEMgrSvc","ndiswanlegacy","qwavedrv","psched")
          foreach ($s in $heavy) {
            Stop-Service -Name $s -Force -ErrorAction SilentlyContinue
            Set-Service -Name $s -StartupType Disabled -ErrorAction SilentlyContinue
          }

          # Giữ Audio
          Set-Service -Name "Audiosrv" -StartupType Automatic
          Set-Service -Name "AudioEndpointBuilder" -StartupType Automatic
          Start-Service -Name "Audiosrv"
          Start-Service -Name "AudioEndpointBuilder"

          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue

          # Tối ưu RDP
          $rdpPolicy = 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services'
          New-Item -Path $rdpPolicy -Force | Out-Null
          Set-ItemProperty -Path $rdpPolicy -Name "MaxCompressionLevel" -Value 2
          Set-ItemProperty -Path $rdpPolicy -Name "MinEncryptionLevel" -Value 1
          Set-ItemProperty -Path $rdpPolicy -Name "NegotiateSecurityLayer" -Value 0
          Set-ItemProperty -Path $rdpPolicy -Name "fDisableCdm" -Value 1
          Set-ItemProperty -Path $rdpPolicy -Name "fEnableAudioCapture" -Value 1
          Set-ItemProperty -Path $rdpPolicy -Name "fDisableAudioCapture" -Value 0
          Set-ItemProperty -Path $rdpPolicy -Name "fDisableAudioRedirection" -Value 0
          Set-ItemProperty -Path $rdpPolicy -Name "fMinBandwidth" -Value 0

          $rdpTcp = 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
          Set-ItemProperty -Path $rdpTcp -Name "ColorDepth" -Value 4
          Set-ItemProperty -Path $rdpTcp -Name "fEnableThinClient" -Value 1
          Set-ItemProperty -Path $rdpTcp -Name "fEnableDesktopComposition" -Value 0
          Set-ItemProperty -Path $rdpTcp -Name "fEnableWddmDriver" -Value 0
          Set-ItemProperty -Path $rdpTcp -Name "NetworkThrottlingIndex" -Value 0xFFFFFFFF

          Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Services\TermDD' -Name "FlowControlDisable" -Value 1 -ErrorAction SilentlyContinue
          Set-ItemProperty -Path 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile' -Name "SystemResponsiveness" -Value 0 -ErrorAction SilentlyContinue

          Write-Host "✅ SERVER PREMIUM HRGBVN PRO ĐÃ HOÀN TẤT!" -ForegroundColor Green
          Write-Host "👤 Username: Nguyen Chi Du - VIP" -ForegroundColor Cyan
          Write-Host "🔑 Password: Đã hiển thị phía trên (copy ngay!)" -ForegroundColor Cyan
