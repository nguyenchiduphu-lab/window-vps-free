name: SERVER PREMIUM HRGBVN PRO 🚀

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Download & Setup Ngrok
        run: |
          Write-Host "Đang tải Ngrok từ GitHub..." -ForegroundColor Cyan
          
          # Dùng winget để cài ngrok (có sẵn trên Windows 11/10)
          try {
            winget install ngrok.ngrok --silent --accept-package-agreements --accept-source-agreements
            $ngrokPath = "$env:LOCALAPPDATA\Microsoft\WindowsApps\ngrok.exe"
            Copy-Item $ngrokPath -Destination ".\ngrok.exe" -Force -ErrorAction SilentlyContinue
          } catch {
            Write-Host "Winget failed, thử cách khác..." -ForegroundColor Yellow
          }
          
          # Nếu winget không được, tải trực tiếp từ ngrok.com
          if (-not (Test-Path ".\ngrok.exe")) {
            Write-Host "Tải từ ngrok.com..." -ForegroundColor Cyan
            $ProgressPreference = 'SilentlyContinue'
            Invoke-WebRequest -Uri "https://ngrok.com/download" -OutFile "ngrok.html" -UseBasicParsing
            # Parse link download từ trang ngrok
            $content = Get-Content "ngrok.html" -Raw
            if ($content -match 'href="([^"]*ngrok-v[^"]*windows[^"]*\.zip)"') {
              $downloadUrl = $matches[1]
              if (-not $downloadUrl.StartsWith("http")) {
                $downloadUrl = "https://ngrok.com" + $downloadUrl
              }
              Write-Host "Found URL: $downloadUrl" -ForegroundColor Green
              Invoke-WebRequest -Uri $downloadUrl -OutFile "ngrok.zip" -UseBasicParsing
              Expand-Archive -Path "ngrok.zip" -DestinationPath "." -Force
            } else {
              # Fallback: dùng URL trực tiếp từ CDN
              Write-Host "Dùng fallback URL..." -ForegroundColor Yellow
              Invoke-WebRequest -Uri "https://ngrok.com/static/downloads/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip" -UseBasicParsing
              Expand-Archive -Path "ngrok.zip" -DestinationPath "." -Force
            }
          }
          
          # Kiểm tra
          if (Test-Path ".\ngrok.exe") {
            Write-Host "✅ Ngrok đã tải thành công!" -ForegroundColor Green
            .\ngrok.exe version
          } else {
            Write-Host "❌ Lỗi: Không tìm thấy ngrok.exe" -ForegroundColor Red
            exit 1
          }

      - name: Auth ngrok
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          .\ngrok.exe authtoken $Env:NGROK_AUTH_TOKEN
          Write-Host "✅ Auth ngrok thành công!" -ForegroundColor Green

      - name: Setup RDP + Max Fast + Reduce Lag Cực Mạnh + CÓ TIẾNG NGHE
        run: |
          # Enable RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

          # Tạo password ngẫu nhiên 12 ký tự
          $randomPassword = -join ((65..90) + (97..122) + (48..57) | Get-Random -Count 12 | ForEach-Object { [char]$_ })
          $randomPassword = $randomPassword + "@2024"
          
          # Tạo user Nguyenchidu
          New-LocalUser "Nguyenchidu" -Password (ConvertTo-SecureString -AsPlainText $randomPassword -Force) -FullName "Nguyenchidu Premium" -Description "SERVER PREMIUM HRGBVN PRO" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "Nguyenchidu" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Administrators" -Member "Nguyenchidu" -ErrorAction SilentlyContinue

          # Lưu password vào file để hiển thị
          $randomPassword | Out-File -FilePath "C:\password.txt" -Force

          # Tắt service nặng (giữ Audio)
          $services = @("SysMain","WSearch","wuauserv","WinDefend","DiagTrack","DPS","DoSvc","Spooler","Themes","BITS","wscsvc","SecurityHealthService","Sense","OneSyncSvc","CDPSvc","DmEnrollmentSvc","PcaSvc","WerSvc","TabletInputService","XblAuthManager","XblGameSave","XboxNetApiSvc","BthAvctpSvc","RmSvc","WlanSvc","WbioSrvc")
          foreach ($svc in $services) {
            Stop-Service -Name $svc -Force -ErrorAction SilentlyContinue
            Set-Service -Name $svc -StartupType Disabled -ErrorAction SilentlyContinue
          }

          # Giữ Audio service
          Set-Service -Name "Audiosrv" -StartupType Automatic -ErrorAction SilentlyContinue
          Set-Service -Name "AudioEndpointBuilder" -StartupType Automatic -ErrorAction SilentlyContinue
          Start-Service -Name "Audiosrv" -ErrorAction SilentlyContinue
          Start-Service -Name "AudioEndpointBuilder" -ErrorAction SilentlyContinue

          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue

          # Tối ưu RDP + Audio
          $rdpPolicy = 'HKLM:\SOFTWARE\Policies\Microsoft\Windows NT\Terminal Services'
          New-Item -Path $rdpPolicy -Force | Out-Null
          Set-ItemProperty -Path $rdpPolicy -Name "fEnableAudioCapture" -Value 1
          Set-ItemProperty -Path $rdpPolicy -Name "fDisableAudioCapture" -Value 0
          Set-ItemProperty -Path $rdpPolicy -Name "fDisableAudioRedirection" -Value 0

          $rdpTcp = 'HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
          Set-ItemProperty -Path $rdpTcp -Name "NetworkThrottlingIndex" -Value 0xFFFFFFFF

          # Intro VIP
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         SERVER PREMIUM HRGBVN PRO 🚀               ║" -ForegroundColor Magenta
          Write-Host "║  ✅ ĐÃ CÓ TIẾNG NGHE - KHÔNG CÒN CẮM NGHE NỮA!     ║" -ForegroundColor Green
          Write-Host "║  Username → Nguyenchidu                            ║" -ForegroundColor Yellow
          Write-Host "║  Password → $randomPassword                        ║" -ForegroundColor Yellow
          Write-Host "╚════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

      - name: Start Ngrok Tunnel - VIP PRO Flash Mode (Low Data + Có Tiếng)
        run: |
          Write-Host ""
          Write-Host "╔════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║         SERVER PREMIUM HRGBVN PRO 🚀               ║" -ForegroundColor Magenta
          Write-Host "║  ⚡ GIẢM LAG CỰC MẠNH - CÓ TIẾNG NGHE ĐẦY ĐỦ       ║" -ForegroundColor Green
          Write-Host "║  → Local Resources → Remote audio → Play on this   ║" -ForegroundColor Yellow
          Write-Host "║    computer                                        ║" -ForegroundColor Yellow
          Write-Host "╚════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          
          # Lấy password đã tạo
          $password = Get-Content "C:\password.txt"
          Write-Host "🔐 Password RDP: $password" -ForegroundColor Magenta
          Write-Host ""
          
          # Khởi động ngrok TCP tunnel cho RDP (port 3389)
          Start-Process -FilePath ".\ngrok.exe" -ArgumentList "tcp 3389" -WindowStyle Hidden
          
          Write-Host "⏳ Đang chờ Ngrok khởi động..." -ForegroundColor Yellow
          Start-Sleep -Seconds 15
          
          # Lấy thông tin tunnel từ API Ngrok
          try {
            $tunnelInfo = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -TimeoutSec 10
            $publicUrl = $tunnelInfo.tunnels[0].public_url
            $hostPort = $publicUrl -replace "tcp://", ""
            
            Write-Host ""
            Write-Host "╔════════════════════════════════════════════════════╗" -ForegroundColor Green
            Write-Host "║  🎉 RDP SERVER ĐÃ SẴN SÀNG!                        ║" -ForegroundColor Green
            Write-Host "╠════════════════════════════════════════════════════╣" -ForegroundColor Cyan
            Write-Host "║  📍 Host: $hostPort" -ForegroundColor Yellow
            Write-Host "║  👤 User: Nguyenchidu" -ForegroundColor Yellow
            Write-Host "║  🔑 Pass: $password" -ForegroundColor Yellow
            Write-Host "╚════════════════════════════════════════════════════╝" -ForegroundColor Green
            Write-Host ""
            Write-Host "⚠️  Lưu ý: Máy sẽ tự động tắt sau 6 giờ!" -ForegroundColor Red
          }
          catch {
            Write-Host "❌ Không thể lấy thông tin tunnel. Kiểm tra ngrok manually!" -ForegroundColor Red
            Write-Host "Truy cập http://localhost:4040 để xem thông tin tunnel" -ForegroundColor Yellow
          }
          
          # Giữ workflow chạy
          while ($true) {
            Start-Sleep -Seconds 60
          }
