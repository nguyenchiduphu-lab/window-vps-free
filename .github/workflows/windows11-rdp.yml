name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Time (1-6h)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Check Token
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.NGROK_AUTH_TOKEN }}")) {
            Write-Host "CANH BAO: Chua co NGROK_AUTH_TOKEN"
          }

      - name: Start
        shell: pwsh
        run: |
          Write-Host "🚀 SERVER HRGBVN PRO"
          Write-Host "${{ env.SUBTITLE }}"
          Write-Host "OS: Windows 11"
          Write-Host "Time: ${{ github.event.inputs.duration }}h"

      - name: Clean
        shell: pwsh
        run: |
          Get-Service WSearch,SysMain,DiagTrack -ErrorAction SilentlyContinue | Stop-Service -Force -ErrorAction SilentlyContinue
          Set-Service WSearch -StartupType Disabled -ErrorAction SilentlyContinue
          Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install Ngrok
        shell: pwsh
        run: |
          try {
            Invoke-WebRequest "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
            Expand-Archive "ngrok.zip" "C:\ngrok" -Force
          } catch {
            Write-Host "CANH BAO: Tai ngrok that bai"
          }

      - name: Setup Ngrok
        shell: pwsh
        run: |
          try {
            & "C:\ngrok\ngrok.exe" config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN }}"
          } catch {
            Write-Host "CANH BAO: Config ngrok that bai"
          }

      - name: Create User
        shell: pwsh
        run: |
          $user = "nguyenchidu"
          $pass = -join ((48..57) + (65..90) + (97..122) | Get-Random -Count 12 | ForEach-Object {[char]$_}) + "@1"
          
          try { Remove-LocalUser -Name $user -ErrorAction SilentlyContinue } catch {}
          
          $securePass = ConvertTo-SecureString $pass -AsPlainText -Force
          New-LocalUser -Name $user -Password $securePass -PasswordNeverExpires -AccountNeverExpires -ErrorAction Stop
          Add-LocalGroupMember -Group "Administrators" -Member $user
          
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          "$user`n$pass" | Out-File "C:\rdpinfo.txt"
          Write-Host "User: $user"
          Write-Host "Pass: $pass"

      - name: Get IP Address
        shell: pwsh
        run: |
          try {
            $ip = Invoke-RestMethod -Uri "https://api.ipify.org" -ErrorAction Stop
            $ip | Out-File "C:\ip.txt"
            Write-Host "IP Public: $ip"
          } catch {
            Write-Host "Khong lay duoc IP"
          }

      - name: Start Tunnel
        shell: pwsh
        run: |
          $ngrokOk = $false
          
          try {
            Start-Process -FilePath "C:\ngrok\ngrok.exe" -ArgumentList "tcp 3389" -WindowStyle Hidden
            Start-Sleep -Seconds 10
            
            for ($i = 1; $i -le 15; $i++) {
              Start-Sleep -Seconds 3
              try {
                $tunnels = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -ErrorAction Stop
                $ngrokOk = $true
                break
              } catch {}
            }
          } catch {
            Write-Host "CANH BAO: Khong start duoc ngrok"
          }
          
          $info = Get-Content "C:\rdpinfo.txt"
          $user = $info[0]
          $pass = $info[1]
          
          if ($ngrokOk) {
            $url = $tunnels.tunnels[0].public_url -replace "tcp://",""
            $parts = $url -split ":"
            
            Write-Host ""
            Write-Host "============================"
            Write-Host "🚀 SERVER HRGBVN PRO - OK"
            Write-Host "${{ env.SUBTITLE }}"
            Write-Host "============================"
            Write-Host "Host: $($parts[0])"
            Write-Host "Port: $($parts[1])"
            Write-Host "User: $user"
            Write-Host "Pass: $pass"
            Write-Host "Time: ${{ github.event.inputs.duration }}h"
            Write-Host "============================"
          } else {
            $ip = Get-Content "C:\ip.txt" -ErrorAction SilentlyContinue
            if ([string]::IsNullOrWhiteSpace($ip)) { $ip = "Khong xac dinh" }
            
            Write-Host ""
            Write-Host "============================"
            Write-Host "🚀 SERVER HRGBVN PRO"
            Write-Host "${{ env.SUBTITLE }}"
            Write-Host "============================"
            Write-Host "CANH BAO: Ngrok khong hoat dong"
            Write-Host ""
            Write-Host "KET NOI TRUC TIEP:"
            Write-Host "IP: $ip"
            Write-Host "Port: 3389"
            Write-Host "User: $user"
            Write-Host "Pass: $pass"
            Write-Host ""
            Write-Host "Time: ${{ github.event.inputs.duration }}h"
            Write-Host "============================"
          }
          
          # LUON CHAY DU THOI GIAN
          $h = [int]"${{ github.event.inputs.duration }}"
          $end = (Get-Date).AddHours($h)
          Write-Host "Bat dau giu may chay trong $h gio..."
          
          while ((Get-Date) -lt $end) {
            Start-Sleep -Seconds 60
            Remove-Item "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue 2>$null
            $remain = $end - (Get-Date)
            Write-Host "Con lai: $($remain.ToString('hh\:mm\:ss'))"
          }
          
          Write-Host "Het thoi gian!"

      - name: Cleanup
        if: always()
        shell: pwsh
        run: |
          Stop-Process -Name "ngrok" -Force -ErrorAction SilentlyContinue
          try { Remove-LocalUser -Name "nguyenchidu" -ErrorAction SilentlyContinue } catch {}
          Remove-Item "C:\rdpinfo.txt" -ErrorAction SilentlyContinue
          Remove-Item "C:\ip.txt" -ErrorAction SilentlyContinue
