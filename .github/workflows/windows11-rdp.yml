name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Time (1-6h)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"
  NGROK_TOKEN: "3AhYtwzZwyMGsFQwLkXpeWjQ0VK_7UW19kGqsP6jDMb6DR5wd"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Info
        shell: cmd
        run: |
          echo 🚀 SERVER HRGBVN PRO
          echo ${{ env.SUBTITLE }}
          echo OS: Windows 11
          echo Time: ${{ github.event.inputs.duration }}h

      - name: Setup
        shell: cmd
        run: |
          sc stop WSearch 2>nul
          sc config WSearch start= disabled 2>nul

      - name: Download Ngrok
        shell: cmd
        run: |
          curl -L -o ngrok.zip https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip
          7z x ngrok.zip -oC:\ -y
          C:\ngrok.exe --version

      - name: Config Token
        shell: cmd
        run: |
          C:\ngrok.exe config add-authtoken ${{ env.NGROK_TOKEN }}

      - name: Create User
        shell: cmd
        run: |
          net user nguyenchidu /delete 2>nul
          net user nguyenchidu HRGBVN2024@ /add
          net localgroup administrators nguyenchidu /add
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f >nul
          netsh advfirewall firewall set rule group="remote desktop" new enable=Yes >nul
          echo User: nguyenchidu
          echo Pass: HRGBVN2024@

      - name: Start Ngrok
        shell: cmd
        run: |
          start /B C:\ngrok.exe tcp 3389
          echo Dang cho ngrok...
          ping -n 30 127.0.0.1 >nul

      - name: Get URL
        shell: powershell
        run: |
          $url = ""
          $try = 0
          
          while ($url -eq "" -and $try -lt 20) {
            try {
              Start-Sleep -Seconds 3
              $json = Invoke-RestMethod -Uri "http://localhost:4040/api/tunnels" -TimeoutSec 5
              $url = $json.tunnels[0].public_url
            } catch {
              $try++
              Write-Host "Thu lan $try..."
            }
          }
          
          if ($url -eq "") {
            Write-Host "LOI: Khong lay duoc URL sau 20 lan thu"
            exit 1
          }
          
          $clean = $url -replace "tcp://",""
          $parts = $clean -split ":"
          
          Write-Host ""
          Write-Host "============================"
          Write-Host "🚀 SERVER HRGBVN PRO"
          Write-Host "${{ env.SUBTITLE }}"
          Write-Host "============================"
          Write-Host "✅ KET NOI RDP:"
          Write-Host "Host: $($parts[0])"
          Write-Host "Port: $($parts[1])"
          Write-Host "User: nguyenchidu"
          Write-Host "Pass: HRGBVN2024@"
          Write-Host "Time: ${{ github.event.inputs.duration }}h"
          Write-Host "============================"

      - name: Keep Alive
        shell: powershell
        run: |
          $h = [int]"${{ github.event.inputs.duration }}"
          for ($i = $h * 60; $i -gt 0; $i--) {
            Start-Sleep -Seconds 60
            Write-Host "Con $i phut"
          }

      - name: Cleanup
        if: always()
        shell: cmd
        run: |
          taskkill /F /IM ngrok.exe 2>nul
          net user nguyenchidu /delete 2>nul
          if exist C:\ngrok.zip del C:\ngrok.zip
