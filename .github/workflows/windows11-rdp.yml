name: server HRGBVN PRO 🚀

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Time (1-6h)'
        required: true
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'

env:
  SUBTITLE: "MADE BY : Nguyễn Chí Dự"
  NGROK_TOKEN: "3AhYtwzZwyMGsFQwLkXpeWjQ0VK_7UW19kGqsP6jDMb6DR5wd"

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    
    steps:
      - name: Info
        run: |
          echo 🚀 SERVER HRGBVN PRO
          echo ${{ env.SUBTITLE }}
          echo OS: Windows 11
          echo Time: ${{ github.event.inputs.duration }}h

      - name: Setup
        run: |
          sc stop WSearch 2>nul
          sc config WSearch start= disabled 2>nul
          del /q /f /s %TEMP%\* 2>nul

      - name: Download Ngrok
        run: |
          curl -L -o ngrok.zip https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip
          7z x ngrok.zip -oC:\ -y
          C:\ngrok.exe --version

      - name: Config Token
        run: |
          C:\ngrok.exe config add-authtoken ${{ env.NGROK_TOKEN }}

      - name: Create User
        run: |
          net user nguyenchidu /delete 2>nul
          net user nguyenchidu HRGBVN2024@ /add
          net localgroup administrators nguyenchidu /add
          reg add "HKLM\SYSTEM\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f >nul
          netsh advfirewall firewall set rule group="remote desktop" new enable=Yes >nul
          echo User: nguyenchidu
          echo Pass: HRGBVN2024@

      - name: Start Ngrok
        run: |
          start /B C:\ngrok.exe tcp 3389 --log=stdout > C:\ngrok.log 2>&1
          ping -n 25 127.0.0.1 >nul

      - name: Get URL
        run: |
          curl -s http://localhost:4040/api/tunnels > C:\tunnel.json
          type C:\tunnel.json | findstr "public_url" > C:\url.txt
          set /p url=<C:\url.txt
          echo %url%
          for /f "tokens=2 delims=:" %%a in ("%url%") do set "host=%%a"
          for /f "tokens=3 delims=:" %%a in ("%url%") do set "port=%%a"
          set "host=%host:"=%"
          set "host=%host:tcp//=%"
          set "host=%host: =%"
          set "port=%port:"=%"
          set "port=%port: }=%"
          echo ============================
          echo 🚀 SERVER HRGBVN PRO
          echo ${{ env.SUBTITLE }}
          echo ============================
          echo Host: %host%
          echo Port: %port%
          echo User: nguyenchidu
          echo Pass: HRGBVN2024@
          echo Time: ${{ github.event.inputs.duration }}h
          echo ============================

      - name: Keep Alive
        run: |
          set /a min=%{ github.event.inputs.duration }% * 60
          :loop
          ping -n 60 127.0.0.1 >nul
          set /a min-=1
          echo Con %min% phut
          if %min% gtr 0 goto loop

      - name: Cleanup
        if: always()
        run: |
          taskkill /F /IM ngrok.exe 2>nul
          net user nguyenchidu /delete 2>nul
          del C:\ngrok.log 2>nul
          del C:\tunnel.json 2>nul
          del C:\url.txt 2>nul
